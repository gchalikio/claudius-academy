# Label catalog for the gchalikio/claudius-academy repo.
#
# Synced to GitHub by .github/workflows/labels.yml on every push to main
# (using EndBug/label-sync). To add or change a label, edit this file and
# push — the workflow handles the rest.
#
# Naming conventions:
#   type/*       — what kind of work it is
#   priority/*   — how urgent
#   status/*     — where in the lifecycle
#   area/*       — which part of the codebase (optional)

# ─── Type ──────────────────────────────────────────────────────
- name: type/bug
  color: d73a4a
  description: Something is broken or behaving unexpectedly

- name: type/feature
  color: a2eeef
  description: New functionality (engine, slide builder, config option)

- name: type/docs
  color: 0075ca
  description: Documentation only

- name: type/refactor
  color: 8a3ffc
  description: Code restructuring without behaviour change

- name: type/perf
  color: ff8800
  description: Performance improvement

- name: type/test
  color: 00b386
  description: Test additions or fixes

- name: type/chore
  color: cccccc
  description: Repo housekeeping (deps, CI, configs)

# ─── Priority ──────────────────────────────────────────────────
- name: priority/critical
  color: b60205
  description: Drop everything — broken on main, blocking a talk

- name: priority/high
  color: d93f0b
  description: Next up — should land in days, not weeks

- name: priority/medium
  color: fbca04
  description: Land when convenient

- name: priority/low
  color: 0e8a16
  description: Nice to have, no rush

# ─── Status ────────────────────────────────────────────────────
- name: status/needs-triage
  color: ededed
  description: Not yet looked at by a maintainer

- name: status/in-progress
  color: 1d76db
  description: Actively being worked on

- name: status/blocked
  color: b60205
  description: Waiting on something external

- name: status/needs-info
  color: fbca04
  description: Waiting for the reporter to clarify

# ─── Community ─────────────────────────────────────────────────
- name: good-first-issue
  color: 7057ff
  description: Suitable for first-time contributors

- name: help-wanted
  color: 008672
  description: Maintainer welcomes outside help

# ─── Area (optional, used when scope is obvious) ───────────────
- name: area/engine
  color: 5319e7
  description: Core engine (router, diagram, modals, etc.)

- name: area/builders
  color: 5319e7
  description: Slide builders

- name: area/theme
  color: 5319e7
  description: Theming, CSS variables, fonts

- name: area/tests
  color: 5319e7
  description: Test suite

- name: area/ci
  color: 5319e7
  description: GitHub Actions, dependabot, release workflow

- name: area/docs
  color: 5319e7
  description: README, CONTRIBUTING, CLAUDE.md, skills

# ─── Inherited from dependabot/issue templates ────────────────
- name: dependencies
  color: 0366d6
  description: Pull requests that update a dependency file

- name: ci
  color: 0366d6
  description: CI/CD pipeline changes
